# .github/workflows/buildn.yaml
# Windows AMD64 Vulkan build using x64-windows-llvm.cmake toolchain
# with Visual Studio 2022 environment on windows-2022 runner

name: Build Windows AMD64 Vulkan (LLVM)

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: 'Commit SHA to build (optional, leave empty for trigger commit)'
        required: false
        default: ''
      create_release:
        description: 'Create new release'
        required: true
        type: boolean
  push:
    branches: [feat/ci]
    paths:
      - '.github/workflows/buildn.yaml'
      - '**/CMakeLists.txt'
      - '**/Makefile'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.glsl'
      - '**/*.comp'
      - '**/*.wgsl'
      - 'cmake/x64-windows-llvm.cmake'
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - '.github/workflows/build-windows-vulkan.yaml'
      - '**/CMakeLists.txt'
      - '**/Makefile'
      - '**/*.h'
      - '**/*.hpp'
      - '**/*.c'
      - '**/*.cpp'
      - '**/*.cu'
      - '**/*.cuh'
      - '**/*.glsl'
      - '**/*.comp'
      - '**/*.wgsl'
      - 'cmake/x64-windows-llvm.cmake'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref && github.ref || github.run_id }}
  cancel-in-progress: true

env:
  VULKAN_VERSION: 1.4.341.1
  BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

jobs:
  windows-latest-vulkan-llvm:
    name: Windows AMD64 Vulkan (LLVM/Clang)
    runs-on: windows-2022

    defaults:
      run:
        shell: powershell

    steps:
      - name: Clone repository
        id: checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0
          ref: ${{ inputs.commit_sha || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Install Ninja
        id: install_ninja
        run: |
          choco install ninja --no-progress -y
          echo "C:/ProgramData/chocolatey/bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Setup Visual Studio environment
        id: setup_vs
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            Write-Error "vswhere not found"
            exit 1
          }
          $vsInstallPath = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -property installationPath
          if (-not $vsInstallPath) {
            Write-Error "Visual Studio installation not found"
            exit 1
          }
          $vsDevCmd = Join-Path $vsInstallPath "Common7\Tools\VsDevCmd.bat"
          if (-not (Test-Path $vsDevCmd)) {
            Write-Error "VsDevCmd.bat not found at $vsDevCmd"
            exit 1
          }
          Write-Host "Using VS at: $vsInstallPath"
          # Run VsDevCmd to set environment for current process
          & cmd /c "`"$vsDevCmd`" -arch=amd64 -host_arch=amd64" | Out-Null
          # Export VS install path for use in CMD steps
          Add-Content $env:GITHUB_ENV "VS_INSTALL_PATH=$vsInstallPath"
          # Export a few markers to GITHUB_ENV so subsequent steps can rely on the setup
          Add-Content $env:GITHUB_ENV "VSCMD_ARG_TGT_ARCH=amd64"
          Add-Content $env:GITHUB_ENV "VSCMD_ARG_HOST_ARCH=amd64"
          # Append current PATH to GITHUB_PATH so subsequent steps inherit tool locations
          Add-Content $env:GITHUB_PATH ($env:PATH)

      - name: Cache Vulkan SDK
        id: cache-vulkan
        uses: actions/cache@v5
        with:
          path: C:\VulkanSDK
          key: vulkan-sdk-${{ env.VULKAN_VERSION }}-${{ runner.os }}-${{ runner.arch }}
          restore-keys: |
            vulkan-sdk-${{ env.VULKAN_VERSION }}-${{ runner.os }}-
            vulkan-sdk-${{ env.VULKAN_VERSION }}-

      - name: Install Vulkan SDK
        id: get_vulkan
        if: steps.cache-vulkan.outputs.cache-hit != 'true'
        run: |
          Write-Host "Downloading Vulkan SDK ${{ env.VULKAN_VERSION }}"
          curl.exe -o $env:RUNNER_TEMP/VulkanSDK-Installer.exe -L "https://sdk.lunarg.com/sdk/download/${{ env.VULKAN_VERSION }}/windows/vulkansdk-windows-X64-${{ env.VULKAN_VERSION }}.exe"
          
          Write-Host "Installing Vulkan SDK silently..."
          & "$env:RUNNER_TEMP\VulkanSDK-Installer.exe" --accept-licenses --default-answer --confirm-command install
          
          # Set environment variables for subsequent steps
          Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${{ env.VULKAN_VERSION }}"
          Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${{ env.VULKAN_VERSION }}\bin"
          
          Write-Host "Vulkan SDK installed at: C:\VulkanSDK\${{ env.VULKAN_VERSION }}"
          
          # Verify installation
          $vulkaninfoPath = "C:\VulkanSDK\${{ env.VULKAN_VERSION }}\bin\vulkaninfo.exe"
          if (Test-Path $vulkaninfoPath) {
            & $vulkaninfoPath --summary 2>&1 | Select-Object -First 5
            if ($LASTEXITCODE -ne 0) {
              Write-Host "vulkaninfo returned non-zero exit code (non-fatal)"
            }
          } else {
            Write-Host "Warning: vulkaninfo.exe not found at expected path"
          }

      - name: Set Vulkan environment (cache or fresh install)
        id: set_vulkan_env
        run: |
          # Always ensure VULKAN_SDK env vars are set, regardless of cache hit
          if (-not $env:VULKAN_SDK) {
            Add-Content $env:GITHUB_ENV "VULKAN_SDK=C:\VulkanSDK\${{ env.VULKAN_VERSION }}"
            Add-Content $env:GITHUB_PATH "C:\VulkanSDK\${{ env.VULKAN_VERSION }}\bin"
          }
          Write-Host "VULKAN_SDK=$env:VULKAN_SDK"

      - name: Configure CMake with Vulkan + LLVM toolchain
        id: cmake_configure
        shell: cmd
        run: |
          call "%VS_INSTALL_PATH%\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          cmake -S . -B build ^
            -G "Ninja" ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_TOOLCHAIN_FILE=cmake/x64-windows-llvm.cmake ^
            -DSD_VULKAN=ON ^
            -DGGML_NATIVE=OFF ^
            -DSD_BUILD_SHARED_LIBS=ON ^
            -DCMAKE_PREFIX_PATH="%VULKAN_SDK%"

      - name: Build sdpp
        id: cmake_build
        shell: cmd
        run: |
          call "%VS_INSTALL_PATH%\Common7\Tools\VsDevCmd.bat" -arch=amd64 -host_arch=amd64
          cmake --build build --config Release -j %NUMBER_OF_PROCESSORS%

      - name: Get commit hash
        id: commit
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/feat/ci' ) || github.event.inputs.create_release == 'true' }}
        uses: prompt/actions-commit-hash@v2

      - name: Get commit count
        id: commit_count
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/feat/ci' ) || github.event.inputs.create_release == 'true' }}
        run: |
          echo "count=$(git rev-list --count HEAD)" >> $env:GITHUB_OUTPUT

      - name: Fetch system info
        id: system-info
        run: |
          echo "CPU_ARCH=x64" >> $env:GITHUB_OUTPUT
          echo "OS_TYPE=Windows" >> $env:GITHUB_OUTPUT

      - name: Pack artifacts
        id: pack_artifacts
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/feat/ci' ) || github.event.inputs.create_release == 'true' }}
        run: |
          $filePath = ".\build\bin\Release\*"
          if (Test-Path $filePath) {
            Write-Host "Found Release binaries at: $filePath"
            Copy-Item ggml/LICENSE .\build\bin\Release\ggml.txt
            Copy-Item LICENSE .\build\bin\Release\stable-diffusion.cpp.txt
            $sourcePath = ".\build\bin\Release\*"
          } elseif (Test-Path ".\build\bin\stable-diffusion.dll") {
            Write-Host "Found binaries at: .\build\bin\"
            Copy-Item ggml/LICENSE .\build\bin\ggml.txt
            Copy-Item LICENSE .\build\bin\stable-diffusion.cpp.txt
            $sourcePath = ".\build\bin\*"
          } else {
            Write-Host "Listing build/bin contents for debugging:"
            Get-ChildItem .\build\bin\ -Recurse | Select-Object FullName
            throw "Can't find stable-diffusion binaries"
          }
          
          $archiveName = "sd-${{ env.BRANCH_NAME }}-${{ steps.commit.outputs.short }}-bin-win-vulkan-llvm-x64.zip"
          Write-Host "Creating archive: $archiveName"
          7z a -tzip "$archiveName" $sourcePath
          
          $archiveSize = (Get-Item $archiveName).Length / 1MB
          Write-Host "Archive created: $archiveName ($([math]::Round($archiveSize, 2)) MB)"
          Add-Content $env:GITHUB_ENV "ARTIFACT_ARCHIVE=$archiveName"

      - name: Upload build artifacts
        if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/feat/ci' ) || github.event.inputs.create_release == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: sd-${{ env.BRANCH_NAME }}-${{ steps.commit.outputs.short }}-bin-win-vulkan-llvm-x64
          path: ${{ env.ARTIFACT_ARCHIVE }}
          retention-days: 7
          if-no-files-found: warn

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs-windows-vulkan-llvm-${{ github.run_number }}
          path: |
            build/Testing/Temporary/
            build/*.log
          retention-days: 14

  release:
    if: ${{ ( github.event_name == 'push' && github.ref == 'refs/heads/feat/ci' ) || ( github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true' ) }}
    needs: [windows-latest-vulkan-llvm]
    runs-on: ubuntu-latest

    steps:
      - name: Clone
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download artifacts
        id: download-artifact
        uses: actions/download-artifact@v4
        with:
          path: ./artifact
          pattern: sd-*
          merge-multiple: true

      - name: Get commit count
        id: commit_count
        run: |
          echo "count=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: commit
        uses: prompt/actions-commit-hash@v2

      - name: Create release
        id: create_release
        uses: anzz1/action-create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ format('{0}-{1}-{2}', env.BRANCH_NAME, steps.commit_count.outputs.count, steps.commit.outputs.short) }}

      - name: Upload release assets
        id: upload_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const path = require('path');
            const fs = require('fs');
            const release_id = '${{ steps.create_release.outputs.id }}';
            const artifactDir = './artifact';
            
            for (let file of fs.readdirSync(artifactDir)) {
              const filePath = path.join(artifactDir, file);
              const ext = path.extname(file).toLowerCase();
              
              if (ext === '.zip' || ext === '.7z') {
                console.log('Uploading release asset:', file);
                await github.rest.repos.uploadReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release_id,
                  name: file,
                  data: fs.readFileSync(filePath)
                });
              }
            }
